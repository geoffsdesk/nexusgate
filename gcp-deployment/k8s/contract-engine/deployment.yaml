apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-engine
  namespace: nexusgate
  labels:
    app.kubernetes.io/name: contract-engine
    app.kubernetes.io/component: contracts
    app.kubernetes.io/part-of: nexusgate
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: contract-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contract-engine
        app.kubernetes.io/component: contracts
        app.kubernetes.io/part-of: nexusgate
    spec:
      serviceAccountName: nexusgate
      terminationGracePeriodSeconds: 30
      containers:
        - name: contract-engine
          image: REGISTRY_URL/contract-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: CONTRACT_ENGINE_PORT
              valueFrom:
                configMapKeyRef:
                  name: nexusgate-config
                  key: CONTRACT_ENGINE_PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexusgate-secrets
                  key: database-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
