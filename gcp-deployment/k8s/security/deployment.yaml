apiVersion: apps/v1
kind: Deployment
metadata:
  name: security
  namespace: nexusgate
  labels:
    app.kubernetes.io/name: security
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: nexusgate
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: security
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: security
        app.kubernetes.io/component: security
        app.kubernetes.io/part-of: nexusgate
    spec:
      serviceAccountName: nexusgate
      terminationGracePeriodSeconds: 30
      containers:
        - name: security
          image: REGISTRY_URL/security:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: SECURITY_PORT
              valueFrom:
                configMapKeyRef:
                  name: nexusgate-config
                  key: SECURITY_PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexusgate-secrets
                  key: database-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
